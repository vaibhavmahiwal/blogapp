name: Node.js Blog CI (Build Only)

# Triggers: Run the workflow automatically on push or pull requests to main branches
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the latest code repository into the GitHub virtual runner environment
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Establish the Node.js runtime environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Automatically caches your npm dependencies for lightning-fast runs

      # Step 3: Install all dependencies exactly as locked in package-lock.json
      - name: Install dependencies
        run: npm ci

      # Step 4: Run the TypeScript compiler script to ensure zero compile-time syntax errors
      - name: Build application
        run: npm run build